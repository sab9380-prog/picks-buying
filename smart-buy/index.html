<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>스마트 매입 — NC PICKS v13-Lite</title>

<!-- Fonts: Pretendard (KO) + Inter (EN) -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

<!-- Design tokens (Round 3-B Phase 1) -->
<link rel="stylesheet" href="./design-tokens.css">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* === Top header (Linear workspace pattern) === */
  header {
    padding: var(--space-3) var(--space-6);
    border-bottom: 1px solid var(--border-subtle);
    background: var(--bg-elevated);
    display: flex; align-items: center; justify-content: space-between;
    gap: var(--space-4);
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(8px);
  }
  header .brand {
    display: flex; align-items: center; gap: var(--space-3);
  }
  header .brand-mark {
    width: 24px; height: 24px; border-radius: var(--r-md);
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover));
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-size: var(--fs-sm); font-weight: var(--fw-bold);
    letter-spacing: -0.02em;
  }
  header h1 {
    font-size: var(--fs-base);
    font-weight: var(--fw-semibold);
    letter-spacing: -0.01em;
    color: var(--text-primary);
    display: inline-flex; align-items: baseline; gap: var(--space-2);
  }
  header h1 .version-tag {
    font-size: var(--fs-xs);
    font-weight: var(--fw-regular);
    color: var(--text-tertiary);
    padding: 2px var(--space-2);
    border-radius: var(--r-pill);
    border: 1px solid var(--border-subtle);
    background: var(--bg-card);
  }
  header .meta {
    font-size: var(--fs-xs);
    color: var(--text-tertiary);
  }

  /* === Main container === */
  main {
    padding: var(--space-6) var(--space-7);
    max-width: 1280px;
    margin: 0 auto;
  }

  /* === Mode toggle (segmented control) === */
  .mode-toggle {
    display: inline-flex; gap: 2px;
    border: 1px solid var(--border-default);
    border-radius: var(--r-md);
    background: var(--bg-card);
    padding: 2px;
    width: fit-content;
    margin-bottom: var(--space-6);
  }
  .mode-toggle button {
    background: transparent; border: 0;
    color: var(--text-secondary);
    padding: var(--space-2) var(--space-4);
    cursor: pointer;
    font-size: var(--fs-sm);
    font-weight: var(--fw-medium);
    border-radius: var(--r-sm);
    transition: color var(--dur-fast) var(--ease-standard),
                background var(--dur-fast) var(--ease-standard);
  }
  .mode-toggle button:hover {
    color: var(--text-primary);
  }
  .mode-toggle button.active {
    background: var(--accent-primary);
    color: #fff;
    font-weight: var(--fw-semibold);
  }

  /* === Input panel === */
  .input-panel {
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-lg);
    padding: var(--space-6);
    margin-bottom: var(--space-6);
  }
  .file-drop {
    border: 2px dashed var(--border-default);
    border-radius: var(--r-md);
    padding: var(--space-8) var(--space-6);
    text-align: center; cursor: pointer;
    transition: border-color var(--dur-fast) var(--ease-standard),
                background var(--dur-fast) var(--ease-standard);
  }
  .file-drop:hover, .file-drop.over {
    border-color: var(--accent-primary);
    background: var(--accent-subtle);
  }
  .file-drop input { display: none; }
  .file-drop p {
    color: var(--text-secondary);
    margin-top: var(--space-2);
    font-size: var(--fs-sm);
  }

  /* === Single form === */
  .single-form { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); }
  .single-form label {
    font-size: var(--fs-xs);
    color: var(--text-secondary);
    display: block; margin-bottom: var(--space-1);
    font-weight: var(--fw-medium);
  }
  .single-form input, .single-form select {
    width: 100%; padding: var(--space-2) var(--space-3);
    background: var(--bg-base);
    border: 1px solid var(--border-default);
    border-radius: var(--r-sm);
    color: var(--text-primary);
    font-size: var(--fs-sm);
    font-family: inherit;
    transition: border-color var(--dur-fast) var(--ease-standard);
  }
  .single-form input:focus, .single-form select:focus {
    outline: none;
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px var(--accent-subtle);
  }
  .single-form .row-button { grid-column: span 4; text-align: right; margin-top: var(--space-2); }
  .btn {
    background: var(--accent-primary);
    color: #fff;
    border: 0;
    padding: var(--space-2) var(--space-5);
    border-radius: var(--r-sm);
    cursor: pointer;
    font-size: var(--fs-sm);
    font-weight: var(--fw-semibold);
    transition: background var(--dur-fast) var(--ease-standard);
  }
  .btn:hover { background: var(--accent-hover); }

  /* === Tabs (Linear active pattern) === */
  .tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: var(--space-5);
  }
  .tabs button {
    background: transparent; border: 0;
    padding: var(--space-3) var(--space-4);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: var(--fs-sm);
    font-weight: var(--fw-medium);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color var(--dur-fast) var(--ease-standard),
                border-color var(--dur-fast) var(--ease-standard);
  }
  .tabs button:hover {
    color: var(--text-primary);
  }
  .tabs button.active {
    color: var(--text-primary);
    border-bottom-color: var(--accent-primary);
    font-weight: var(--fw-semibold);
  }
  .tab-content { min-height: 200px; }
  .tab-content[hidden] { display: none !important; }

  /* 등급 배지 (전역) */
  .grade-badge { display: inline-block; padding: 2px 8px; border-radius: 4px;
                 font-size: 11px; font-weight: 600; color: #fff; }
  .grade-badge.g-80, .overall-grade-badge.g-80 { background: var(--grade-80); }
  .grade-badge.g-70, .overall-grade-badge.g-70 { background: var(--grade-70); }
  .grade-badge.g-60, .overall-grade-badge.g-60 { background: var(--grade-60); }
  .grade-badge.g-50, .overall-grade-badge.g-50 { background: var(--grade-50); }
  .grade-badge.g-0,  .overall-grade-badge.g-0  { background: var(--grade-0); }
  .overall-grade-badge { display: inline-block; padding: 4px 12px; border-radius: 6px;
                         font-size: 13px; font-weight: 700; color: #fff; }

  /* === 대시보드 === */
  .dash { display: flex; flex-direction: column; gap: 18px; }
  .dash-section { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .dash-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .dash-section h4 { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  .dash-section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .dash-section-head h3 { margin-bottom: 0; }

  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .kpi { background: var(--panel-2); border-radius: 6px; padding: 12px; }
  .kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .kpi-value { font-size: 20px; font-weight: 700; }
  .kpi-sub   { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .kpi-badge { padding-top: 4px; }

  .dash-chart { padding: 4px; }
  .dash-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .dash-stat { background: var(--panel-2); border-radius: 6px; padding: 12px; }
  .dash-stat h4 { display: flex; justify-content: space-between; align-items: center; }
  .toggle-bucket { display: inline-flex; gap: 0; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .toggle-bucket button { background: transparent; border: 0; color: var(--muted);
                          padding: 2px 8px; cursor: pointer; font-size: 10px; }
  .toggle-bucket button.active { background: var(--accent); color: #fff; }

  .dash-summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .dash-summary-card { background: var(--panel-2); border-radius: 6px; padding: 12px; }
  .buy-rate-cmp div { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
  .buy-rate-cmp b { color: var(--accent); font-size: 14px; }
  .buy-rate-note { color: var(--muted); font-size: 10px !important; padding-top: 4px !important; border-top: 1px dashed var(--border); }

  /* === 표 + 디테일 패널 (Phase 4에서 채움) === */
  .table-layout { display: grid; grid-template-columns: 1fr; gap: 12px; align-items: flex-start; }
  .table-layout.with-detail { grid-template-columns: 60% 40%; }
  .table-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: auto; max-height: 70vh; }
  table.sku { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1100px; }
  table.sku th, table.sku td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  table.sku th { color: var(--muted); font-weight: 500; font-size: 11px; cursor: pointer; user-select: none;
                 background: var(--panel-2); position: sticky; top: 0; z-index: 1; }
  table.sku th.sort-asc::after  { content: ' ▲'; color: var(--accent); }
  table.sku th.sort-desc::after { content: ' ▼'; color: var(--accent); }
  table.sku tbody tr { cursor: pointer; }
  table.sku tbody tr:hover { background: var(--panel-2); }
  table.sku tbody tr.active { background: rgba(77, 154, 255, 0.12); }
  table.sku td.cell-mismatch { background: rgba(231, 76, 60, 0.18); color: #ffb1ab; font-weight: 600; }
  table.sku td.cell-mismatch::before { content: '⚠ '; }
  table.sku td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.sku td.actions-cell { text-align: center; }

  .detail-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px;
                  position: sticky; top: 16px; max-height: 80vh; overflow: auto; }
  .detail-panel header { padding: 0; border: 0; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .detail-panel h3 { font-size: 14px; font-weight: 600; }
  .detail-panel .close-btn { background: transparent; border: 0; color: var(--muted); cursor: pointer; font-size: 18px; }
  .detail-panel .meta { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
  .detail-panel .section { margin-bottom: 12px; padding-top: 8px; border-top: 1px solid var(--border); }
  .detail-panel .section h4 { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .detail-panel .kv { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px; font-size: 12px; }
  .detail-panel .kv span { color: var(--muted); }
  .detail-panel .kv b { color: var(--text); }
  .detail-panel .risk { color: var(--counter); font-size: 12px; padding: 4px 0; }
  .detail-panel .actions { display: flex; gap: 6px; margin-top: 8px; }
  .detail-panel .memo { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
                        padding: 6px 8px; border-radius: 4px; font-family: inherit; font-size: 12px; margin-top: 6px;
                        resize: vertical; min-height: 36px; }
  .detail-panel .history { font-size: 11px; color: var(--muted); }
  .detail-panel .history li { padding: 2px 0; list-style: none; }

  .actions { display: flex; gap: 4px; }
  .btn-buy, .btn-counter, .btn-pass {
    background: var(--buy); color: #fff; border: 0; padding: 4px 8px; border-radius: 4px;
    cursor: pointer; font-size: 11px; font-weight: 600;
  }
  .btn-counter { background: var(--counter); }
  .btn-pass    { background: var(--pass); }
  .btn-buy.decided     { box-shadow: 0 0 0 2px var(--buy);     }
  .btn-counter.decided { box-shadow: 0 0 0 2px var(--counter); }
  .btn-pass.decided    { box-shadow: 0 0 0 2px var(--pass);    }
  .detail-panel .actions button { padding: 8px 12px; font-size: 13px; flex: 1; }

  .empty-state {
    padding: var(--space-8);
    text-align: center;
    color: var(--text-tertiary);
    font-size: var(--fs-sm);
  }
  #status-bar {
    padding: var(--space-2) var(--space-4);
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-md);
    margin-bottom: var(--space-4);
    font-size: var(--fs-sm);
    color: var(--text-secondary);
    display: none;
  }
  #status-bar.show { display: block; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="brand-mark" aria-hidden="true">S</span>
    <h1>스마트 매입<span class="version-tag">v13-Lite · Round 3-B</span></h1>
  </div>
  <div class="meta">on-demand · 9개 진단 · 대시보드 + TOP 20 + 전체 SKU 표</div>
</header>
<main>
  <div class="mode-toggle" data-testid="mode-toggle">
    <button id="btn-mode-bulk"   class="active" data-mode="bulk">Excel 일괄</button>
    <button id="btn-mode-single"             data-mode="single">단건 입력</button>
  </div>

  <!-- 일괄 입력 -->
  <section id="panel-bulk" class="input-panel">
    <div class="file-drop" id="file-drop" data-testid="file-drop">
      <input type="file" id="file-input" accept=".xlsx,.xls" />
      <strong>📁 Excel 드래그·드롭 또는 클릭</strong>
      <p>BRAND/STYLE/COLOR/SIZE/CATEGORY/GENDER/PRODUCT_TYPE/FOB/JSC/RRP/QTY/SEASON/CHANNEL/ARRIVAL 컬럼 자동 탐지</p>
    </div>
  </section>

  <!-- 단건 입력 -->
  <section id="panel-single" class="input-panel" style="display:none;">
    <form class="single-form" id="single-form">
      <div><label>브랜드</label><input name="brand" value="ADIDAS" /></div>
      <div><label>스타일</label><input name="style" value="SAMBA OG" /></div>
      <div><label>컬러</label><input name="color" value="CORE BLACK" /></div>
      <div><label>사이즈</label><input name="size" value="42" /></div>
      <div><label>카테고리</label>
        <select name="category">
          <option>FOOTWEAR</option><option>APPAREL</option>
          <option>ACCESSORY</option><option>OTHER</option>
        </select>
      </div>
      <div><label>성별</label>
        <select name="gender">
          <option>MEN</option><option>WOMEN</option>
          <option>UNISEX</option><option>KIDS</option>
        </select>
      </div>
      <div><label>아이템(product)</label><input name="product" value="SNEAKERS" /></div>
      <div><label>스포츠(ADIDAS만)</label><input name="sports" value="ORIGINALS" /></div>
      <div><label>JSC EUR</label><input name="jsc" type="number" step="0.01" value="60" /></div>
      <div><label>RRP EUR</label><input name="rrp" type="number" step="0.01" value="120" /></div>
      <div><label>수량</label><input name="qty" type="number" value="100" /></div>
      <div><label>시즌</label><input name="season" value="SS26" /></div>
      <div class="row-button">
        <button type="submit" class="btn">진단 실행</button>
      </div>
    </form>
  </section>

  <div id="status-bar"></div>

  <!-- 결과 영역 -->
  <section id="results-section" style="display:none;">
    <div class="tabs" data-testid="tabs">
      <button id="tab-dashboard" class="active" data-tab="dashboard">전체 오퍼</button>
      <button id="tab-top20"                 data-tab="top20">TOP 20 매입 추천</button>
      <button id="tab-all"                   data-tab="all">전체 SKU 표</button>
    </div>
    <div id="tab-content-dashboard" class="tab-content" data-testid="tab-dashboard"></div>
    <div id="tab-content-top20"     class="tab-content" data-testid="tab-top20" hidden></div>
    <div id="tab-content-all"       class="tab-content" data-testid="tab-all" hidden></div>
  </section>
</main>

<script type="module" src="./app.js"></script>
</body>
</html>
